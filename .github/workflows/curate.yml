# Automated, scheduled catalog sync for providers with auto_sync (public-repo safe).
#
# The daily job runs ONE phase — a keyless model-catalog update:
#
#   Catalog sync — KEYLESS. For each auto_sync=models_dev provider, attach the
#   canonical models it already serves (per models.dev), with that provider's
#   resale pricing. Needs no API key.
#
# Automatic new-model onboarding and deprecation (the Artificial Analysis
# `curate apply` / `curate resolve` phase) is intentionally NOT run here. Those
# decisions are made by a maintainer on demand — run `bun run curate apply` /
# `resolve` / `suggest` locally (they require AA_API_KEY) to onboard or deprecate
# models. The daily job only refreshes catalogs; it never adds canonical models
# or stages deprecations.
#
# The result is collected into a single bot PR for a maintainer to review.
# Providers without auto_sync are never touched here.
#
# Required secrets (one — no AA or per-provider keys):
#   RELEASE_BOT_APP_ID / _PRIVATE_KEY  the GitHub App that opens the PR (so CI
#                                      runs on the bot PR, same as release-plz)
name: curate

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: curation
  cancel-in-progress: true

jobs:
  curate:
    # don't run on forks of a public repo
    if: github.repository == 'bitrouter/provider-registry'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Pre-flight (registry valid, scripts compile)
        run: |
          bun run validate
          bunx tsc --noEmit

      # Keyless model-catalog update. For each auto_sync=models_dev provider,
      # attach the canonical models it already serves (per models.dev) with that
      # provider's resale pricing. No AA_API_KEY: this never onboards a new
      # canonical model or stages a deprecation — it only updates catalogs.
      - name: Catalog sync (keyless)
        run: |
          set -euo pipefail
          bun run curate sync --write 2>&1 | tee /tmp/sync.txt
          bun run validate # post-write gate

      - name: Build PR body
        id: report
        if: always()
        run: |
          DATE=$(date -u +%F)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          {
            echo "body<<__CURATE_EOF__"
            echo "Automated catalog sync — as-of **$DATE** — auto_sync providers only."
            echo "Keyless model-catalog update: attaches the canonical models each auto_sync=models_dev provider serves, per models.dev. New-model onboarding and deprecation (Artificial Analysis) are NOT run automatically — a maintainer runs \`curate apply\` / \`resolve\` on demand. Review the diff and merge."
            echo
            echo "### Catalog sync (keyless)"
            echo '```'
            cat /tmp/sync.txt 2>/dev/null || echo "(did not run)"
            echo '```'
            echo "__CURATE_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Open / update bot PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.token.outputs.token }}
          branch: bot/curation
          base: main
          title: "chore(curation): automated catalog sync ${{ steps.report.outputs.date }}"
          commit-message: "chore(curation): automated catalog sync (as-of ${{ steps.report.outputs.date }})"
          body: ${{ steps.report.outputs.body }}
          labels: automated-curation
          delete-branch: false
