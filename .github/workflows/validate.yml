name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: bun run validate
        run: bun run validate

      - name: registry.json in sync with YAML source
        run: bun test

      - name: bun tsc --noEmit (sanity check scripts compile)
        run: bunx tsc --noEmit
