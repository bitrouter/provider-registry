# Artificial Analysis → canonical crosswalk (the cache of judgments).
#
# Keyed on AA's stable model UUID (`id`), NOT the human slug — so when AA
# renames a slug (e.g. dropping `-preview`/`-it`), the mapping survives.
#
# Each entry has exactly one verdict:
#   canonical:   <id>   this AA model IS this canonical model
#   collapse_of: <id>   a variant (reasoning/effort/thinking) of <id>; its score
#                       counts toward <id> for ranking, but it is not a model on
#                       its own
#   ignore:      <why>  deliberately unmapped (negative cache, so it stops
#                       re-surfacing as "unresolved" every run)
# `slug` is human-readable only. `by`/`date` are provenance for re-review.
#
# This file is the frozen output of a one-time judgment (agent/human). The pure
# `bun run curate` resolver reads it as a lookup table; the mechanical fallback
# (deterministic slug normalization) covers the easy cases, so only the cases it
# gets WRONG need to live here. Grow it with `bun run curate suggest`.
