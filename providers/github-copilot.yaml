# GitHub Copilot — OAuth Device Flow + per-model protocol map.
#
# Official references:
# - GitHub OAuth Device Flow:
#   https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/authorizing-oauth-apps#device-flow
# - Copilot API surface (chat / messages endpoints at api.githubcopilot.com):
#   https://docs.github.com/en/copilot/reference/api-reference/copilot-api-endpoints
# - VS Code Copilot Chat (MIT) — reference impl of the GitHub→Copilot token
#   exchange + per-model protocol routing:
#   https://github.com/microsoft/vscode-copilot-chat
#
# Two-step auth: `login github-copilot` runs the device flow (stores a GitHub
# user-to-server token ghu_…); per request the consumer's `github-copilot`
# handler exchanges it for a short-lived Copilot Bearer. Only the public OAuth
# params live here; the exchange + integration headers are the consumer's
# handler. Copilot multiplexes families behind one host, so protocol is
# per-model-glob. The catalog is the gateway's `/models`, pulled at runtime via
# `auto_sync: v1_models`. `access: local_oauth` — credentials are minted by the
# local device flow, so there is no portable key to BYOK or pool.
name: github-copilot
display_name: GitHub Copilot
kind: gateway
billing: subscription
access: local_oauth
api_base: https://api.githubcopilot.com
doc_url: https://docs.github.com/en/copilot/reference/api-reference/copilot-api-endpoints
api_protocol:
  - "claude-*": anthropic
  - "gpt-5.5": responses
  - "gpt-5.5-codex": responses
  - "gpt-5.1-codex": responses
  - "gpt-5.1-codex-mini": responses
  - "gpt-5.3-codex": responses
  - "gpt-5.2-codex": responses
  - "*": openai
auth:
  kind: oauth
  handler: github-copilot
  params:
    # Opencode's public client_id, reused while bitrouter has no registered
    # GitHub OAuth App. Source: opencode auth registry. A caller may override
    # via their own config.
    client_id: Ov23li8tweQw6odWQebz
    scope: read:user
    device_authorization_endpoint: https://github.com/login/device/code
    token_endpoint: https://github.com/login/oauth/access_token
models:
  - id: anthropic/claude-sonnet-4.5
    provider_model_id: claude-sonnet-4.5
  - id: anthropic/claude-haiku-4.5
    provider_model_id: claude-haiku-4.5
  - id: google/gemini-3.5-flash
    provider_model_id: gemini-3.5-flash
  - id: openai/gpt-5.4-nano
    provider_model_id: gpt-5.4-nano
  - id: anthropic/claude-opus-4.7
    provider_model_id: claude-opus-4.7
  - id: openai/gpt-5.2
    provider_model_id: gpt-5.2
  - id: openai/gpt-5.3-codex
    provider_model_id: gpt-5.3-codex
  - id: anthropic/claude-opus-4.8
    provider_model_id: claude-opus-4.8
  - id: anthropic/claude-fable-5
    provider_model_id: claude-fable-5
  - id: anthropic/claude-opus-4.5
    provider_model_id: claude-opus-4.5
  - id: openai/gpt-5.4
    provider_model_id: gpt-5.4
  - id: openai/gpt-5.4-mini
    provider_model_id: gpt-5.4-mini
  - id: google/gemini-3.1-pro-preview
    provider_model_id: gemini-3.1-pro-preview
  - id: anthropic/claude-sonnet-4.6
    provider_model_id: claude-sonnet-4.6
  - id: google/gemini-3-flash-preview
    provider_model_id: gemini-3-flash-preview
  - id: anthropic/claude-opus-4.6
    provider_model_id: claude-opus-4.6
  - id: openai/gpt-5.2-codex
    provider_model_id: gpt-5.2-codex
  - id: openai/gpt-5.5
    provider_model_id: gpt-5.5
status: active
auto_sync:
  feed: models_dev
