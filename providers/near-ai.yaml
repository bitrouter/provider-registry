# NEAR AI — confidential (TEE) inference, BYOK-only.
#
# Served through bitrouter's attested private-ai-gateway (Intel TDX + NVIDIA GPU
# TEE), not directly at NEAR. `byok_only: true` means this provider is only
# reachable with the caller's own NEAR key (held server-side in bitrouter-cloud,
# never here). `default_api_base` is the gateway's /v1 base; bitrouter-cloud's
# /v1/aci/* verification proxy reads this same value.
#
# `id` is the shared canonical id; `provider_model_id` is NEAR's raw model id
# (the string sent upstream). Capabilities are provisional (mirrors tinfoil) and
# should be confirmed by scripts/verify-capabilities.ts once the gateway is live.
name: near-ai
byok_only: true
default_api_base: https://CHANGE-ME-near-gateway.internal/v1
auth_scheme: bearer
verified: false
status: active
weight: 1

api_protocol:
  - "*": openai

rate_limits:
  - "*":
      requests_per_minute: 60

models:
  # ── Anthropic (confidential) ──────────────────────────────────────────
  - id: anthropic/claude-haiku-4.5
    provider_model_id: anthropic/claude-haiku-4-5
    capabilities: [reasoning, structured_outputs, tools]
