name: minimax
# First-party provider — bitrouter-cloud holds no platform key for
# this entry. Routable only via the caller's own MiniMax key
# (`POST /v1/byok/keys` on the cloud). See
# bitrouter/bitrouter-cloud#318. Default base targets the
# Anthropic-protocol endpoint on api.minimax.io; the api_protocol
# below pins the chain to the anthropic wire protocol so the cloud
# dispatches correctly.
byok_only: true
default_api_base: https://api.minimax.io/anthropic/v1
api_protocol:
  - "*": anthropic
rate_limits:
  - "*":
      requests_per_minute: 60
# Catalog source: https://models.dev/api.json (provider key `minimax`, api=https://api.minimax.io/anthropic/v1 — Anthropic-protocol endpoint).
# Pricing is per 1M tokens.
models:
