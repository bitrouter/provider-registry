# OpenRouter — OpenAI-compatible aggregator. Bearer auth on `Authorization`.
#
# Official auth + endpoint docs:
# - https://openrouter.ai/docs/api-reference/authentication
#   ("Pass your API key in the `Authorization: Bearer <KEY>` header.")
# - https://openrouter.ai/docs/api-reference/overview
#   (base URL `https://openrouter.ai/api/v1`; Chat Completions wire format;
#   provider routing happens inside OpenRouter)
#
# `auto_discover`: OpenRouter proxies hundreds of upstream models that it
# routes internally — the catalog is not curated here; the consumer pulls it
# from the gateway's `/models` endpoint at runtime via `auto_sync: v1_models`.
# All models speak Chat Completions, so a single `*` protocol applies to
# whatever is discovered.
name: openrouter
display_name: OpenRouter
kind: gateway
api_base: https://openrouter.ai/api/v1
doc_url: https://openrouter.ai/docs/api-reference/overview
api_protocol:
  - "*": openai
auth:
  kind: bearer
  env: OPENROUTER_API_KEY
