name: tencent
# Tencent Cloud "TokenHub" international (Singapore station) — an OpenAI-
# compatible model marketplace re-serving DeepSeek / GLM / Kimi / MiniMax.
# Bearer-token auth (OpenAI transport). Prices below are the Singapore-station
# USD-per-1M-token rates. Manual provider (no auto_sync): TokenHub's catalog is
# curated here from the vendor's published model + price list.
# Official: https://www.tencentcloud.com/ (TI / MaaS TokenHub)
api_protocol:
  - "*": openai
api_base: https://tokenhub-intl.tencentcloudmaas.com/v1
rate_limits:
  - "*":
      requests_per_minute: 60
models:
  - id: deepseek/deepseek-v3.2
    provider_model_id: deepseek-v3.2
    pricing:
      input_tokens:
        no_cache: 0.57
        cache_read: 0.114
      output_tokens:
        text: 1.71
    capabilities:
      - reasoning
      - structured_outputs
      - tools
  - id: deepseek/deepseek-v4-flash
    provider_model_id: deepseek-v4-flash
    pricing:
      input_tokens:
        no_cache: 0.14
