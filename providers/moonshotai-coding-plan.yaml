name: moonshotai-coding-plan
# First-party subscription endpoint — Moonshot "Kimi Code" coding
# subscription (membership-based). bitrouter-cloud holds no platform key
# for this entry; it is routable only via the caller's own Kimi Code key
# (`POST /v1/byok/keys` on the cloud). A Kimi Code membership key is NOT
# the same as a Moonshot open-platform key and works only on the coding
# endpoint.
#
# OpenAI-compatible endpoint (`Authorization: Bearer <key>`, no extra
# headers required). The coding plan exposes a single server-side model
# alias, `kimi-for-coding`, that maps to Moonshot's latest coding model.
# Official docs:
#   https://www.kimi.com/code/docs/en/
# NOTE (ToS): Moonshot forbids forging another tool's client identifier
# (User-Agent). bitrouter-cloud sends its own honest User-Agent, so no
# client-impersonation is involved.
byok_only: true
default_api_base: https://api.kimi.com/coding/v1
api_protocol:
  - "*": openai
rate_limits:
  - "*":
      requests_per_minute: 60
# `kimi-for-coding` is a moving server-side alias for Moonshot's latest
# coding model; it is mapped here to the flagship canonical id so the
# model is routable. Pricing mirrors the standard flagship for reference
# only — Kimi Code is a flat-rate subscription and BYOK traffic is billed
# by Moonshot, not metered per token by bitrouter-cloud.
models:
  - id: moonshotai/kimi-k2.6
    provider_model_id: kimi-for-coding
    pricing:
      input_tokens:
        no_cache: 0.95
        cache_read: 0.16
      output_tokens:
        text: 4
    capabilities:
      - reasoning
      - tools
status: active
weight: 1
submitted_at: 2026-06-05
auto_sync:
  feed: models_dev
  key: kimi-for-coding
