# Ambient — OpenAI-compatible inference API. Bearer auth on `Authorization`.
#
# Official auth + endpoint docs:
# - https://docs.ambient.xyz/ (developer docs)
# - https://api.ambient.xyz/docs (OpenAPI reference)
# - base URL `https://api.ambient.xyz/v1`; Chat Completions wire format
#   (`POST /v1/chat/completions`); model list at `GET /v1/models`.
#
# Catalog source: models.dev (provider key `ambient`). The curation bot writes
# back canonical `models` + `pricing` from that feed; consumers pull the full
# live catalog from the same channel at runtime. Ambient also serves its own
# `GET /v1/models` — see the `v1_models` alternative noted in the PR.
name: ambient
display_name: Ambient
api_base: https://api.ambient.xyz/v1
doc_url: https://docs.ambient.xyz/
api_protocol:
  - "*": openai
rate_limits:
  - "*":
      requests_per_minute: 60
auth:
  kind: bearer
  env: AMBIENT_API_KEY
# Seed the one model verified production-ready on Ambient's live API:
# `moonshotai/kimi-k2.7-code` (~1.7s TTFT, ~65 tok/s, standard OpenAI-compatible
# streaming via `delta.content`). Pricing is from Ambient's live `GET /v1/models`
# (USD per 1M tokens) — authoritative for billing and currently higher than the
# models.dev feed. The daily `curate sync` is additive + idempotent: it leaves
# this hand-set entry untouched and only attaches the other canonical models
# Ambient serves from the same feed at runtime.
models:
  - id: moonshotai/kimi-k2.7-code
    provider_model_id: moonshotai/kimi-k2.7-code
    pricing:
      input_tokens:
        no_cache: 0.84
      output_tokens:
        text: 3.99
    capabilities:
      - reasoning
      - tools
      - structured_outputs
  - id: moonshotai/kimi-k2.6
    provider_model_id: moonshotai/kimi-k2.6
    pricing:
      input_tokens:
        no_cache: 0.95
        cache_read: 0.2
        cache_write: 0
      output_tokens:
        text: 4
status: active
weight: 1
submitted_at: 2026-06-23
auto_sync:
  feed: models_dev
