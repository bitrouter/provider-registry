name: tinfoil
api_protocol:
  - "*": openai
rate_limits:
  - "*":
      requests_per_minute: 60
models:
  # Catalog source: https://docs.tinfoil.sh/chat-models — tinfoil's own
  # slugs go in `provider_model_id`; the `id` is our canonical name.
  - id: deepseek-v4-pro
    # Tinfoil deployment is configured for 800K context vs. the upstream 1M.
    provider_model_id: deepseek-v4-pro
    pricing:
      input_tokens:
        no_cache: 0.35
        cache_read: 0.07
      output_tokens:
        text: 0.5
  - id: glm-5.1
    provider_model_id: glm-5-1
    pricing:
      input_tokens:
        no_cache: 0.28
      output_tokens: {}
  - id: kimi-k2.6
    provider_model_id: kimi-k2-6
    pricing:
      input_tokens:
        no_cache: 0.3
        cache_read: 0.06
      output_tokens: {}
  - id: gemma4-31b
    provider_model_id: gemma4-31b
    pricing:
      input_tokens:
        no_cache: 0.05
      output_tokens: {}
  - id: gpt-oss-120b
    provider_model_id: gpt-oss-120b
    pricing:
      input_tokens:
        no_cache: 0.1
      output_tokens: {}
status: active
weight: 1
