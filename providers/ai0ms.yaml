name: ai0ms
# AI0MS (all.ai0ms.com) — an anonymous OpenAI-compatible aggregator reseller.
# Formerly the registry's `anon-b` entry; recovered, named, and made transparent
# under v2 (real name + public endpoint, marked `community`). Bearer auth.
# Rates mirror OpenRouter's published pricing for the underlying OpenAI models.
api_protocol:
  - "*": openai
api_base: https://all.ai0ms.com/v1
rate_limits:
  - "*":
      requests_per_minute: 60
community: true
models:
  - id: openai/gpt-5.4
    provider_model_id: gpt-5.4
    pricing:
      input_tokens:
        no_cache: 2.5
        cache_read: 0.25
      output_tokens:
        text: 15.0
    capabilities:
      - reasoning
      - tools
  - id: openai/gpt-5.4-mini
    provider_model_id: gpt-5.4-mini
    pricing:
      input_tokens:
        no_cache: 0.75
        cache_read: 0.075
      output_tokens:
        text: 4.5
    capabilities:
      - reasoning
      - tools
  - id: openai/gpt-5.5
    provider_model_id: gpt-5.5
    pricing:
      input_tokens:
        no_cache: 5.0
        cache_read: 0.5
      output_tokens:
        text: 30.0
    capabilities:
      - reasoning
      - tools
status: active
weight: 1
submitted_at: 2026-05-25
byok: false
